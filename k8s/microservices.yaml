---
# Order Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: your_dockerhub_user/ecom-order-service:latest
        env:
        - name: DB_USER
          value: admin
        - name: DB_PASSWORD
          value: password
        - name: DB_HOST
          value: postgres
        - name: DB_NAME
          value: orderdb
        - name: DB_PORT
          value: "5432"
        ports:
        - containerPort: 3003
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  ports:
  - port: 3003
  selector:
    app: order-service

---
# Payment Service
